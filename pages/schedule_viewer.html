<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Print Schedule</title>

    <link rel="stylesheet" href="/css/styles.css">

    <style>
        /* PAGE WRAPPER */

        #scheduleViewerPage {
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        #scheduleViewerPage h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        /* GRADE SECTIONS */

        #scheduleViewerPage .grade-section {
            margin-bottom: 40px;
        }

        #scheduleViewerPage .grade-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* TABLES */

        #scheduleViewerPage table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        #scheduleViewerPage th,
        #scheduleViewerPage td {
            border: 1px solid black;
            padding: 10px;
            word-wrap: break-word;
        }

        #scheduleViewerPage th {
            background-color: #f0f0f0;
            text-align: left;
        }

        /* Course Number */

        #scheduleViewerPage td:nth-child(2),
        #scheduleViewerPage th:nth-child(2) {
            width: 160px;
            text-align: center;
        }

        /* Credits */

        #scheduleViewerPage td:nth-child(3),
        #scheduleViewerPage th:nth-child(3) {
            width: 120px;
            text-align: center;
        }

        #scheduleViewerPage .total-row {
            font-weight: bold;
        }

        /* PRINT BUTTON */

        .print-button-container {
            text-align: center;
            margin-top: 40px;
        }

        #printButton {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
        }

        /* GRADUATION ALERT */

        #graduationAlert {

            position: fixed;

            top: 20px;
            right: 20px;

            width: min(450px, 90vw);

            max-height: calc(100vh - 40px);

            background: #d32f2f;
            color: white;

            border-radius: 10px;

            overflow: visible;

            box-shadow: 0 6px 18px rgba(0, 0, 0, .3);

            display: none;

            z-index: 9999;
        }

        #alertHeader {

            display: flex;

            justify-content: space-between;

            align-items: flex-start;

            gap: 10px;

            padding: 12px 15px;

            background: rgba(0, 0, 0, .15);

            cursor: move;

            user-select: none;
        }

        #alertTitle {

            flex-grow: 1;

            font-size: 20px;

            font-weight: bold;

            white-space: normal;

            overflow-wrap: break-word;
        }

        #minimizeAlertBtn {

            width: 30px;

            height: 30px;

            min-width: 30px;

            cursor: pointer;

            font-size: 18px;

            font-weight: bold;
        }

        #alertBody {

            padding: 15px;

            max-height: calc(100vh - 110px);

            overflow-y: auto;
        }

        #alertBody ul {

            margin: 0;

            padding-left: 20px;
        }


        #alertBody li {

            margin-bottom: 8px;

            line-height: 1.4;
        }

        #graduationAlert.minimized {

            width: 250px;
        }

        #graduationAlert.minimized #alertBody {

            display: none;
        }

        /* PRINT */

        @media print {

            @page {

                size: landscape;

                margin: 0.5in;
            }

            #navbar,
            .print-button-container,
            #graduationAlert,
            #scheduleViewerPage h1 {

                display: none !important;
            }

            body {

                margin: 0;
            }
        }
    </style>

</head>

<body>

    <div id="navbar"></div>

    <div id="requirementAlert"></div>
    <div id="graduationAlert">

        <div id="alertHeader">

            <span id="alertTitle">
                Graduation Requirements Not Met
            </span>

            <div>

                <button id="minimizeAlertBtn">−</button>

            </div>

        </div>

        <div id="alertBody"></div>

    </div>

    <div id="scheduleViewerPage">

        <h1>Schedule Viewer</h1>

        <div id="scheduleContainer"></div>

        <div class="print-button-container">
            <button id="printButton">
                Print Schedule
            </button>
        </div>

    </div>

    <script src="/js/nav.js"></script>
    <script src="/js/printview.js"></script>
    <script src="/js/verifyGrades.js"></script>
    <script src="/js/verifyGrade9.js"></script>
    <script src="/js/verifyGrade10.js"></script>
    <script src="/js/verifyGrade11.js"></script>
    <script src="/js/verifyGrade12.js"></script>
    <script src="/js/popupManager.js"></script>
    <script src="/js/verifySchedule.js"></script>

</body>

</html>
