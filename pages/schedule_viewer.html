<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Print Schedule</title>

    <link rel="stylesheet" href="/css/styles.css">

    <style>

        /* PAGE WRAPPER */

        #scheduleViewerPage {
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        #scheduleViewerPage h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        /* GRADE SECTIONS */

        #scheduleViewerPage .grade-section {
            margin-bottom: 40px;
        }

        #scheduleViewerPage .grade-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* TABLES */

        #scheduleViewerPage table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        #scheduleViewerPage th,
        #scheduleViewerPage td {
            border: 1px solid black;
            padding: 10px;
            word-wrap: break-word;
        }

        #scheduleViewerPage th {
            background-color: #f0f0f0;
            text-align: left;
        }

        /* Course Number */

        #scheduleViewerPage td:nth-child(2),
        #scheduleViewerPage th:nth-child(2) {
            width: 160px;
            text-align: center;
        }

        /* Credits */

        #scheduleViewerPage td:nth-child(3),
        #scheduleViewerPage th:nth-child(3) {
            width: 120px;
            text-align: center;
        }

        #scheduleViewerPage .total-row {
            font-weight: bold;
        }

        /* PRINT BUTTON */

        .print-button-container {
            text-align: center;
            margin-top: 40px;
        }

        #printButton {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
        }

        /* GRADUATION ALERT */

        #graduationAlert {

            position: fixed;

            top: 20px;
            right: 20px;

            width: 350px;

            background: #d32f2f;
            color: white;

            padding: 18px;

            border-radius: 10px;

            box-shadow: 0 6px 18px rgba(0,0,0,.3);

            display: none;

            z-index: 9999;
        }

        #graduationAlert h3 {

            margin: 0 0 12px 0;
        }

        #graduationAlert ul {

            margin: 0;
            padding-left: 20px;
        }

        #graduationAlert li {

            margin-bottom: 6px;
        }

        /* PRINT */

        @media print {

            @page {
                size: landscape;
                margin: 0.5in;
            }

            #navbar,
            .print-button-container,
            #graduationAlert {
                display: none !important;
            }

            body {
                margin: 0;
            }
        }

    </style>

</head>

<body>

    <div id="navbar"></div>

    <div id="graduationAlert"></div>

    <div id="scheduleViewerPage">

        <h1>Print Schedule Page</h1>

        <div id="scheduleContainer"></div>

        <div class="print-button-container">
            <button id="printButton">
                Print Schedule
            </button>
        </div>

    </div>

    <script src="/js/nav.js"></script>
    <script src="/js/printview.js"></script>
    <script src="/js/verifySchedule.js"></script>

</body>

</html>
